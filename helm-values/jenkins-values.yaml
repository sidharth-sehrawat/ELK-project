controller:
  nodeSelector:
    workload: stateful

  resources:
    requests:
      cpu: "1000m"
      memory: "2Gi"
    limits:
      cpu: "2000m"
      memory: "4Gi"

  serviceType: LoadBalancer

agent:
  enabled: true

  nodeSelector:
    workload: stateless

  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "1000m"
      memory: "2Gi"
